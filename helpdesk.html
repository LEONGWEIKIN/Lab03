<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWA Help Desk Appointment</title>
</head>
<body>
    <form method="post" action="https://mercury.swin.edu.au/it000000/formtest.php">
     <a href="https://www.swinburne.edu.au" target="_blank">
     
        <img src="bum.jpg" alt="Swinburne logo">
     </a>
    <h1>CWA Help Desk Appointment</h1>
    <p>The help desk is located in ATC620. Open 10.30 to 19.00 Monday to Friday</p>
    <p>Check Blackboard for when CWA tutors will be there</p>
    <fieldset>
        <legend>Student details</legend>
        <p>
            <label for="studentId">Student ID</label>
            <input type="text" name="studentId" id="studentId" pattern="\d{7,10}" required>

        </p>
        <p>
            <label for="givenName">Given Name</label>
            <input type="text" name="givenName" id="givenName" maxlength="15" required pattern="[A-Za-z]{1,15}">
            <label for="familyName">Family Name</label>
            <input type="text" name="familyName" id="familyName" maxlength="15" required pattern="[A-Za-z]{1,15}">

        </p>

    </fieldset>
    <fieldset>
        <legend>Your Unit</legend>
        <p><label for="COS10011">COS10011</label>
            <input type="radio" name="subject" id="COS10011" value="COS10011" required>
            <label for="COS60007">COS60007</label>
            <input type="radio" name="subject" id="COS60007" value="COS60007">
            <label for="COS60004">COS60004</label>
            <input type="radio" name="subject" id="COS60004" value="COS60004">
        
        </p>
        <p>
            <label for="tutor">Your tutor</label>
            <select name="tutor" id="tutor" required>
                <option value="">Please Select</option>
                <option value="1st">Henry</option>
                <option value="2nd">Zhi Quan</option>
                <option value="3rd">Ethan</option>
            </select>

        
        </p>
    </fieldset>
    <fieldset>
        <legend>Issue</legend>
        <p>
            <label for="HTML">HTML</label>
            <input type="checkbox" name="Language[]" id="HTML" value="HTML" checked>
            <label for="CSS">CSS</label>
            <input type="checkbox" name="Language[]" id="CSS" value="CSS">
             <label for="JavaScript">JavaScript</label>
            <input type="checkbox" name="Language[]" id="JavaScript" value="JavaScript">
            <label for="PHP">PHP</label>
            <input type="checkbox" name="Language[]" id="PHP" value="PHP">
            <label for="MySQL">MySQL</label>
            <input type="checkbox" name="Language[]" id="MySQL" value="MySQL">
        </p>
        <p>
            <label for="description">Description of Issue</label><br>
            <textarea name="description" id="description" rows="4" cols="50" placeholder="Write the description of your problem here....."></textarea>
        </p>
    </fieldset>
    <fieldset>
        <legend>Preferred Date / Time</legend>
            <p>
            <label for="date">Date</label>
            <input type="text" id="date" name="date" placeholder="dd/mm/yyyy" pattern="\d{2}/\d{2}/\d{4}" required><br>
             <label for="time">Time</label>
            <input type="text" id="time" name="time" placeholder="00:00" pattern="\d{2}:\d{2}" required>
        </p>
    </fieldset>
       
        
    <p>
        <input type="submit" value="Book">
        <input type="reset" value="Reset Form">
    </p>

    </form>
</body>
</html>
